{% extends 'base.html' %}

{% block title %}Task Calendar{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="fas fa-calendar-alt"></i> Task Calendar</h2>
        <a href="{% url 'todo:task_list' %}" class="btn btn-outline-secondary">Back to Tasks</a>
    </div>

    <div id="calendar-loading" class="alert alert-info" style="display:none;">Loading calendar...</div>
    <div class="card">
        <div class="card-body">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="createTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create Task for Selected Date</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" action="{% url 'todo:task_create' %}">
                <div class="modal-body">
                    {% csrf_token %}
                    <input type="hidden" id="taskDate" name="due_date">

                    <div class="mb-3">
                        <label for="modalTaskTitle" class="form-label">Task Title</label>
                        <input id="modalTaskTitle" name="title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="modalTaskDescription" class="form-label">Description</label>
                        <textarea id="modalTaskDescription" name="description" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
