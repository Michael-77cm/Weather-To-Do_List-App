{% extends 'base.html' %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="container" style="max-width: 640px;">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <strong><i class="fas fa-trash-alt"></i> Confirm Delete</strong>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete this task?</p>
            <p class="mb-4"><strong>{{ task.title }}</strong></p>

            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'todo:task_detail' task.id %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
